stages:
  - test
  - build
  - deploy

test:
  stage: test
  image: python:3.12-slim
  script:
    - pip install -r app/requirements.txt
    - python -c "import flask, docker; print('All imports OK')"

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t devops-dashboard:$CI_COMMIT_SHORT_SHA .
    - docker tag devops-dashboard:$CI_COMMIT_SHORT_SHA devops-dashboard:latest
    - echo "Image built successfully"

deploy:
  stage: deploy
  script:
    - cd ~/devops-dashboard
    - docker compose up -d --build
  tags:
    - local
