stages:
  - test
  - build
  - deploy

test:
  stage: test
  tags:
    - local
  image: python:3.12-slim
  script:
    - pip install -r app/requirements.txt
    - python -c "import flask, docker; print('All imports OK')"

build:
  stage: build
  tags:
    - local
  image: docker:24
  script:
    - docker build -t devops-dashboard:latest .
    - docker tag devops-dashboard:latest devops-dashboard:$CI_COMMIT_SHORT_SHA
    - echo "Image devops-dashboard:$CI_COMMIT_SHORT_SHA built"

deploy:
  stage: deploy
  tags:
    - local
  image: docker:24
  script:
    - docker stop devops-dashboard || true
    - docker rm devops-dashboard || true
    - docker run -d
        --name devops-dashboard
        --network gitlab_net
        -p 5001:5000
        -v /var/run/docker.sock:/var/run/docker.sock
        --restart unless-stopped
        devops-dashboard:latest
    - echo "Deployed successfully"
